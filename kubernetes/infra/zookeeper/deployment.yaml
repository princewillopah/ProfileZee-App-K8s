apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: profilezee
spec:
  replicas: 1

  selector:
    matchLabels:
      app: zookeeper

  template:
    metadata:
      labels:
        app: zookeeper

    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0

          ports:
            - containerPort: 2181

          env:
            - name: ZOOKEEPER_CLIENT_PORT
              valuefrom:
                configMapKeyRef:
                  name: profilezee-infra-config
                  key: ZOOKEEPER_CLIENT_PORT

            - name: ZOOKEEPER_TICK_TIME
              valueFrom:
                configMapKeyRef:
                  name: profilezee-infra-config
                  key: ZOOKEEPER_TICK_TIME

          volumeMounts:
            - name: zookeeper-storage
              mountPath: /var/lib/zookeeper/data

          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 15

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: zookeeper-storage
          persistentVolumeClaim:
            claimName: zookeeper-pvc
