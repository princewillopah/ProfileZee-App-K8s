alertmanager:
  enabled: false          # skip for now, add later

prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: "4GB"

    enableRemoteWriteReceiver: true

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    # Scrape your profilezee services via ServiceMonitor
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector:
      matchNames:
        - profilezee
        - monitoring
    serviceMonitorSelector: {}

    # Also scrape via static config for services without ServiceMonitor
    additionalScrapeConfigs:
      - job_name: profilezee-user-service
        static_configs:
          - targets: ["user-service.profilezee.svc.cluster.local:8001"]
        metrics_path: /metrics

      - job_name: profilezee-profile-service
        static_configs:
          - targets: ["profile-service.profilezee.svc.cluster.local:8002"]
        metrics_path: /metrics

      - job_name: profilezee-auth-service
        static_configs:
          - targets: ["auth-service.profilezee.svc.cluster.local:8003"]
        metrics_path: /actuator/prometheus

      - job_name: profilezee-notification-service
        static_configs:
          - targets: ["notification-service.profilezee.svc.cluster.local:8004"]
        metrics_path: /metrics

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

grafana:
  enabled: false          # we deploy grafana separately for more control