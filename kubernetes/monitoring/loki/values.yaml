deploymentMode: SingleBinary    # lightweight single-node mode

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  persistence:
    enabled: true
    storageClass: standard
    size: 5Gi

# Disable unneeded components for single-node
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: false

minio:
  enabled: false

chunksCache:
  enabled: false
  
resultsCache:
  enabled: false

# Disable test resources
lokiCanary:
  enabled: false

test:
  enabled: false