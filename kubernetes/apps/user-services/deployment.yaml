apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: profilezee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: princewillopah2/profilezee-user-service:latest
          ports:
            - containerPort: 8001

          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: profilezee-infra-config
                  key: REDIS_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: profilezee-infra-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: profilezee-app-secrets
                  key: USERS_DATABASE_URL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
