apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed
  namespace: profilezee
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      # This replaces depends_on - wait for services to be ready
      - name: wait-for-user-service
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z user-service 8001; do echo waiting for user-service; sleep 2; done']
      - name: wait-for-auth-service
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z auth-service 8003; do echo waiting for auth-service; sleep 2; done']
      containers:
      - name: seed
        image: princewillopah2/profilezee-user-service:latest  # same image you built from ./user-service
        # command: ["python", "seed.py"]
        command:
          - sh
          - -c
          - |
            sleep 30
            python seed.py
        envFrom:
        - configMapRef:
            name: service-urls
        - secretRef:
            name: profilezee-admin-secret
            
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"