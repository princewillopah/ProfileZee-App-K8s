events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Internal upstream blocks — Docker DNS resolves these service names
    upstream user_service     { server user-service:8001; }
    upstream profile_service  { server profile-service:8002; }
    upstream auth_service     { server auth-service:8003; }
    upstream notification_svc { server notification-service:8004; }

    server {
        listen 80;

        # ── API routes — proxied to microservices ──────────────────────
        # Rule: anything starting with /api/* goes to a backend service.
        # Nginx strips the /api prefix before forwarding.

        location /api/users {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }

        location /api/profiles {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://profile_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10M;
        }

        location /api/auth {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://notification_svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend — serve React static files ───────────────────────
        # Rule: anything that is NOT /api/* is treated as a frontend route.
        # try_files: look for the exact file, then fall back to index.html.
        # The fallback is what makes React Router work — all page routes
        # (e.g. /users/123) return index.html and React handles the routing.

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
