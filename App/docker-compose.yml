version: "3.9"

services:

  # ─── INFRASTRUCTURE ────────────────────────────────────────────────
  postgres-users:
    image: postgres:15
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin -d users_db"]
      interval: 5s
      retries: 10

  postgres-profiles:
    image: postgres:15
    environment:
      POSTGRES_DB: profiles_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_profiles_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin -d profiles_db"]
      interval: 5s
      retries: 10

  mysql-auth:
    image: mysql:8
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-padmin"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD","kafka-topics","--bootstrap-server","localhost:9092","--list"]
      interval: 15s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.created --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.updated --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.deleted --partitions 1 --replication-factor 1 &&
        echo 'Kafka topics created'
      "

  db-seed:
      build: ./user-service
      command: python seed.py
      environment:
        USER_SERVICE_URL: http://user-service:8001
        AUTH_SERVICE_URL: http://auth-service:8003
        ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
      depends_on:
        user-service:
          condition: service_started
        auth-service:
          condition: service_started

  # ─── MICROSERVICES ─────────────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "18001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@postgres-users:5432/users_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres-users:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  profile-service:
    build: ./profile-service
    ports:
      - "18002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@postgres-profiles:5432/profiles_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      postgres-profiles:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "18003:8003"
    environment:
      MYSQL_URL: jdbc:mysql://mysql-auth:3306/auth_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    ports:
      - "18004:8004"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@userapp.com}
    depends_on:
      kafka:
        condition: service_healthy

  # ─── FRONTEND ─────────────────────────────────────────────────
  # The frontend service builds the React application and shares the build output with the nginx service via a Docker volume.
  frontend:
    build: ./frontend
    volumes:
      - react_build:/app/build   # builds React into the shared volume

# The nginx service serves the static files from the shared volume and proxies API requests to the backend services.
  nginx:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - react_build:/usr/share/nginx/html  # nginx reads from the same volume
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - user-service
      - profile-service
      - auth-service
      - notification-service

volumes:
  postgres_users_data:
  postgres_profiles_data:
  mysql_auth_data:
  zookeeper_data:
  react_build:             # add this new shared volume
