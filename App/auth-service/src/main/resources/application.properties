server.port=8003
spring.application.name=auth-service

# Logging
# logging.level.org.springframework=INFO
# logging.level.com.example=DEBUG 
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoints.web.base-path=/actuator

# MySQL
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/auth_db}
spring.datasource.username=${MYSQL_USER:admin}
spring.datasource.password=${MYSQL_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-super-long-secret}
app.jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=*
